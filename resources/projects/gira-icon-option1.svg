<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#B1D18A" opacity="0.15"/>

  <!-- Terminal window -->
  <rect x="30" y="45" width="140" height="110" rx="6" fill="#1a1c17" stroke="#FEB52B" stroke-width="2.5"/>

  <!-- Terminal header -->
  <rect x="30" y="45" width="140" height="18" rx="6" fill="#FEB52B"/>
  <rect x="30" y="57" width="140" height="6" fill="#FEB52B"/>

  <!-- Terminal dots -->
  <circle cx="42" cy="51" r="2.5" fill="#1a1c17"/>
  <circle cx="52" cy="51" r="2.5" fill="#1a1c17"/>
  <circle cx="62" cy="51" r="2.5" fill="#1a1c17"/>

  <!-- Kanban columns -->
  <g opacity="0.9">
    <!-- Column 1: TODO -->
    <rect x="42" y="75" width="32" height="70" rx="3" fill="none" stroke="#B1D18A" stroke-width="2"/>
    <rect x="46" y="80" width="24" height="12" rx="2" fill="#B1D18A"/>
    <rect x="46" y="96" width="24" height="12" rx="2" fill="#B1D18A" opacity="0.6"/>

    <!-- Column 2: IN PROGRESS -->
    <rect x="84" y="75" width="32" height="70" rx="3" fill="none" stroke="#FEB52B" stroke-width="2"/>
    <rect x="88" y="80" width="24" height="12" rx="2" fill="#FEB52B"/>
    <rect x="88" y="96" width="24" height="12" rx="2" fill="#FEB52B" opacity="0.6"/>
    <rect x="88" y="112" width="24" height="12" rx="2" fill="#FEB52B" opacity="0.3"/>

    <!-- Column 3: DONE -->
    <rect x="126" y="75" width="32" height="70" rx="3" fill="none" stroke="#B1D18A" stroke-width="2"/>
    <rect x="130" y="80" width="24" height="12" rx="2" fill="#B1D18A"/>
    <!-- Checkmark on done card -->
    <path d="M 136 85 L 139 88 L 144 82" stroke="#1a1c17" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- Speed lines (top right) -->
  <g stroke="#FEB52B" stroke-width="2" stroke-linecap="round" opacity="0.4">
    <line x1="155" y1="70" x2="165" y2="70"/>
    <line x1="158" y1="77" x2="165" y2="77"/>
  </g>
</svg>
