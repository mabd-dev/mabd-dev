<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#FEB52B" opacity="0.15"/>

  <!-- Large K letter (Kotlin) -->
  <g fill="#FEB52B">
    <rect x="65" y="55" width="10" height="90" rx="2"/>
    <polygon points="75,100 105,55 118,55 88,100 118,145 105,145"/>
  </g>

  <!-- Annotation symbols (@) around the K -->
  <g fill="none" stroke="#B1D18A" stroke-width="2.5">
    <circle cx="45" cy="70" r="8"/>
    <path d="M 48 70 Q 52 70, 52 74 L 52 76" stroke-linecap="round"/>
  </g>

  <g fill="none" stroke="#B1D18A" stroke-width="2.5">
    <circle cx="135" cy="85" r="8"/>
    <path d="M 138 85 Q 142 85, 142 89 L 142 91" stroke-linecap="round"/>
  </g>

  <g fill="none" stroke="#B1D18A" stroke-width="2.5">
    <circle cx="45" cy="130" r="8"/>
    <path d="M 48 130 Q 52 130, 52 134 L 52 136" stroke-linecap="round"/>
  </g>

  <!-- Code transformation arrow -->
  <g stroke="#FEB52B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 60 165 L 100 165 L 100 175"/>
    <polygon points="100,180 95,172 105,172" fill="#FEB52B"/>
  </g>

  <!-- Generated code representation (brackets and lines) -->
  <g stroke="#B1D18A" stroke-width="2.5" stroke-linecap="round">
    <path d="M 70 165 L 70 155" opacity="0.6"/>
    <path d="M 80 165 L 80 158" opacity="0.6"/>
    <path d="M 90 165 L 90 155" opacity="0.6"/>
  </g>

  <!-- Processor/gear icon (representing KSP) -->
  <g transform="translate(135, 130)">
    <circle cx="0" cy="0" r="18" fill="#1a1c17" stroke="#FEB52B" stroke-width="2.5"/>
    <circle cx="0" cy="0" r="8" fill="#FEB52B"/>
    <!-- Gear teeth -->
    <rect x="-3" y="-20" width="6" height="5" fill="#FEB52B" rx="1"/>
    <rect x="-3" y="15" width="6" height="5" fill="#FEB52B" rx="1"/>
    <rect x="-20" y="-3" width="5" height="6" fill="#FEB52B" rx="1"/>
    <rect x="15" y="-3" width="5" height="6" fill="#FEB52B" rx="1"/>
  </g>

  <!-- Code brackets at bottom -->
  <text x="85" y="195" font-family="monospace" font-size="18" font-weight="bold" fill="#B1D18A" opacity="0.7">{  }</text>
</svg>
