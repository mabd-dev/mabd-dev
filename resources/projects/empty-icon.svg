<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#FEB52B" opacity="0.15"/>

  <!-- Phone/device outline (tilted) -->
  <rect x="65" y="40" width="70" height="120" rx="8" fill="#1a1c17" stroke="#FEB52B" stroke-width="3" transform="rotate(15 100 100)"/>

  <!-- Screen -->
  <rect x="72" y="50" width="56" height="100" rx="4" fill="#2a2c25" transform="rotate(15 100 100)"/>

  <!-- Maze paths (simplified) -->
  <g transform="rotate(15 100 100)" stroke="#B1D18A" stroke-width="2" stroke-linecap="round">
    <path d="M 80 60 L 80 80 L 95 80" fill="none"/>
    <path d="M 95 90 L 95 110 L 110 110" fill="none"/>
    <path d="M 115 70 L 115 85" fill="none"/>
    <path d="M 85 130 L 105 130 L 105 120" fill="none"/>
  </g>

  <!-- Ball (the game piece) -->
  <circle cx="105" cy="85" r="6" fill="#FEB52B">
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0,0; 2,3; -1,2; 0,0"
      dur="2s"
      repeatCount="indefinite"/>
  </circle>

  <!-- Motion lines (showing physics/movement) -->
  <g opacity="0.6">
    <path d="M 115 90 Q 120 95 118 100" stroke="#FEB52B" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M 90 105 Q 85 110 88 115" stroke="#FEB52B" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>
</svg>
