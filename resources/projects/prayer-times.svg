<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#B1D18A" opacity="0.15"/>

  <!-- Mosque -->
  <g transform="translate(100, 70)">
    <!-- Minarets (left and right) -->
    <rect x="-45" y="-15" width="8" height="40" fill="#FEB52B" rx="1"/>
    <rect x="37" y="-15" width="8" height="40" fill="#FEB52B" rx="1"/>

    <!-- Minaret tops -->
    <circle cx="-41" cy="-16" r="5" fill="#B1D18A"/>
    <circle cx="41" cy="-16" r="5" fill="#B1D18A"/>

    <!-- Minaret crescents -->
    <path d="M -41 -23 L -41 -26 M -39 -25 A 2 2 0 1 0 -43 -25" stroke="#FEB52B" stroke-width="1" fill="none"/>
    <path d="M 41 -23 L 41 -26 M 43 -25 A 2 2 0 1 0 39 -25" stroke="#FEB52B" stroke-width="1" fill="none"/>

    <!-- Main dome -->
    <ellipse cx="0" cy="0" rx="30" ry="20" fill="#FEB52B"/>

    <!-- Dome crescent on top -->
    <g transform="translate(0, -20)">
      <line x1="0" y1="0" x2="0" y2="-8" stroke="#B1D18A" stroke-width="2"/>
      <path d="M 2 -12 A 5 5 0 1 0 2 -4 A 4 4 0 1 1 2 -12 Z" fill="#B1D18A"/>
    </g>

    <!-- Main building -->
    <rect x="-35" y="0" width="70" height="35" fill="#FEB52B" opacity="0.9"/>

    <!-- Entrance arch -->
    <path d="M -10 35 L -10 15 Q -10 5, 0 5 Q 10 5, 10 15 L 10 35" fill="#1a1c17"/>

    <!-- Windows -->
    <circle cx="-20" cy="15" r="3" fill="#1a1c17" opacity="0.5"/>
    <circle cx="20" cy="15" r="3" fill="#1a1c17" opacity="0.5"/>
  </g>

  <!-- Five time dots representing 5 prayers -->
  <g transform="translate(100, 125)">
    <circle cx="-30" cy="0" r="5" fill="#B1D18A"/>
    <circle cx="-15" cy="0" r="5" fill="#B1D18A"/>
    <circle cx="0" cy="0" r="5" fill="#FEB52B"/>
    <circle cx="15" cy="0" r="5" fill="#B1D18A"/>
    <circle cx="30" cy="0" r="5" fill="#B1D18A"/>
  </g>

  <!-- Clock hands showing current prayer time -->
  <g transform="translate(100, 160)">
    <circle cx="0" cy="0" r="15" fill="none" stroke="#FEB52B" stroke-width="2"/>
    <!-- Hour hand -->
    <line x1="0" y1="0" x2="0" y2="-8" stroke="#FEB52B" stroke-width="2" stroke-linecap="round"/>
    <!-- Minute hand -->
    <line x1="0" y1="0" x2="6" y2="0" stroke="#B1D18A" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2" fill="#FEB52B"/>
  </g>

  <!-- Decorative arc showing day cycle -->
  <path d="M 50 85 Q 100 40, 150 85" stroke="#B1D18A" stroke-width="1.5" stroke-dasharray="3,3" fill="none" opacity="0.4"/>

  <!-- Sun icon at arc start (sunrise) -->
  <circle cx="50" cy="85" r="4" fill="#FEB52B" opacity="0.6"/>

  <!-- Moon icon at arc end (sunset) -->
  <circle cx="150" cy="85" r="4" fill="#B1D18A" opacity="0.6"/>
</svg>
