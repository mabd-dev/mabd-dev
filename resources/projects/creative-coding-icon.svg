<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Canvas/screen background -->
  <rect x="30" y="30" width="140" height="140" rx="8" fill="#1a1c17" stroke="#FEB52B" stroke-width="3"/>

  <!-- Generative art pattern - flowing curves -->
  <g opacity="0.8">
    <path d="M 50 80 Q 80 60, 110 80 T 150 80" stroke="#B1D18A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 50 100 Q 80 120, 110 100 T 150 100" stroke="#FEB52B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 50 120 Q 80 100, 110 120 T 150 120" stroke="#B1D18A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Particles -->
  <circle cx="65" cy="70" r="3" fill="#FEB52B">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="100" cy="65" r="2.5" fill="#B1D18A">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="135" cy="72" r="3" fill="#FEB52B">
    <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Code brackets in corner -->
  <g transform="translate(140, 145)" fill="#FEB52B" opacity="0.7">
    <text font-family="monospace" font-size="20" font-weight="bold">&lt;/&gt;</text>
  </g>

  <!-- Geometric shapes (representing creative elements) -->
  <circle cx="70" cy="140" r="8" fill="none" stroke="#B1D18A" stroke-width="2"/>
  <rect x="90" y="132" width="16" height="16" fill="none" stroke="#FEB52B" stroke-width="2" rx="2"/>
  <polygon points="125,148 117,133 133,133" fill="none" stroke="#B1D18A" stroke-width="2" stroke-linejoin="round"/>
</svg>
