<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Patterns | Creative Coding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            backdrop-blur-sm;
        }

        .back-link {
            color: #8B5CF6;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            margin-bottom: 1rem;
            transition: opacity 0.3s ease;
        }

        .back-link:hover {
            opacity: 0.8;
        }

        .title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #8B5CF6;
            margin-bottom: 0.5rem;
        }

        .description {
            font-size: 0.95rem;
            color: #A78BFA;
            margin-bottom: 1rem;
            line-height: 1.4;
            max-width: 280px;
        }

        .control-group {
            margin-bottom: 0.8rem;
        }

        .control-group label {
            display: block;
            font-size: 0.9rem;
            color: #e0e0e0;
            margin-bottom: 0.3rem;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: #8B5CF6;
        }

        .control-group span {
            font-size: 0.85rem;
            color: #A78BFA;
        }

        @media (max-width: 768px) {
            .controls {
                top: 10px;
                left: 10px;
                right: 10px;
                padding: 1rem;
            }

            .description {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <a href="index.html" class="back-link">← Back to Experiments</a>
        <h1 class="title">Wave Patterns</h1>
        <p class="description">Mesmerizing sine wave animations creating fluid, organic movements.</p>

        <div class="control-group">
            <label for="waveCount">Wave Layers: <span id="waveValue">6</span></label>
            <input type="range" id="waveCount" min="3" max="12" value="6">
        </div>

        <div class="control-group">
            <label for="amplitude">Amplitude: <span id="ampValue">80</span></label>
            <input type="range" id="amplitude" min="30" max="150" value="80">
        </div>

        <div class="control-group">
            <label for="speed">Speed: <span id="speedValue">0.02</span></label>
            <input type="range" id="speed" min="0.01" max="0.05" step="0.001" value="0.02">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        let waveCount = 6;
        let amplitude = 80;
        let speed = 0.02;
        let time = 0;

        // Wave colors (purple gradient)
        const colors = [
            'rgba(139, 92, 246, 0.8)',
            'rgba(167, 139, 250, 0.7)',
            'rgba(196, 181, 253, 0.6)',
            'rgba(221, 214, 254, 0.5)',
            'rgba(167, 139, 250, 0.4)',
            'rgba(139, 92, 246, 0.3)',
            'rgba(124, 58, 237, 0.3)',
            'rgba(109, 40, 217, 0.2)',
            'rgba(91, 33, 182, 0.2)',
            'rgba(76, 29, 149, 0.1)',
            'rgba(67, 24, 134, 0.1)',
            'rgba(55, 19, 108, 0.1)'
        ];

        function drawWave(y, wavelength, phase, amplitude, color) {
            ctx.beginPath();
            ctx.moveTo(0, height);

            for (let x = 0; x <= width; x++) {
                const waveY = y + Math.sin((x / wavelength) + phase) * amplitude;
                ctx.lineTo(x, waveY);
            }

            ctx.lineTo(width, height);
            ctx.closePath();

            ctx.fillStyle = color;
            ctx.fill();
        }

        function animate() {
            // Clear canvas
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);

            // Draw waves from back to front
            for (let i = waveCount - 1; i >= 0; i--) {
                const y = height / 2 + (i - waveCount / 2) * 30;
                const wavelength = 200 + i * 50;
                const phase = time + i * 0.5;
                const amp = amplitude * (1 - i / (waveCount * 2));
                const color = colors[i % colors.length];

                drawWave(y, wavelength, phase, amp, color);
            }

            time += speed;
            requestAnimationFrame(animate);
        }

        // Window resize
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // Controls
        document.getElementById('waveCount').addEventListener('input', (e) => {
            waveCount = parseInt(e.target.value);
            document.getElementById('waveValue').textContent = waveCount;
        });

        document.getElementById('amplitude').addEventListener('input', (e) => {
            amplitude = parseInt(e.target.value);
            document.getElementById('ampValue').textContent = amplitude;
        });

        document.getElementById('speed').addEventListener('input', (e) => {
            speed = parseFloat(e.target.value);
            document.getElementById('speedValue').textContent = speed.toFixed(3);
        });

        // Start animation
        animate();
    </script>
</body>
</html>
