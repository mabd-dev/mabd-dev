<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experiment Name | Creative Coding</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        .controls {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.8);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(139, 92, 246, 0.3);
            backdrop-blur-sm;
        }

        .back-link {
            color: #8B5CF6;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            margin-bottom: 1rem;
            transition: opacity 0.3s ease;
        }

        .back-link:hover {
            opacity: 0.8;
        }

        .title {
            font-size: 1.4rem;
            font-weight: 700;
            color: #8B5CF6;
            margin-bottom: 0.5rem;
        }

        .description {
            font-size: 0.95rem;
            color: #A78BFA;
            margin-bottom: 1rem;
            line-height: 1.4;
            max-width: 280px;
        }

        .control-group {
            margin-bottom: 0.8rem;
        }

        .control-group label {
            display: block;
            font-size: 0.9rem;
            color: #e0e0e0;
            margin-bottom: 0.3rem;
        }

        .control-group input[type="range"] {
            width: 100%;
            accent-color: #8B5CF6;
        }

        .control-group span {
            font-size: 0.85rem;
            color: #A78BFA;
        }

        .button {
            background: #8B5CF6;
            color: #fff;
            border: none;
            padding: 0.7rem 1.2rem;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
            transition: all 0.3s ease;
        }

        .button:hover {
            background: #7C3AED;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .controls {
                top: 10px;
                left: 10px;
                right: 10px;
                padding: 1rem;
            }

            .description {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="controls">
        <a href="index.html" class="back-link">← Back to Experiments</a>
        <h1 class="title">Experiment Name</h1>
        <p class="description">Description of what this experiment does and how to interact with it.</p>

        <!-- Example controls - customize as needed -->
        <div class="control-group">
            <label for="param1">Parameter 1: <span id="param1Value">50</span></label>
            <input type="range" id="param1" min="0" max="100" value="50">
        </div>

        <div class="control-group">
            <label for="param2">Parameter 2: <span id="param2Value">100</span></label>
            <input type="range" id="param2" min="50" max="200" value="100">
        </div>

        <!-- Optional button -->
        <!-- <button class="button" onclick="resetCanvas()">Reset</button> -->
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Parameters
        let param1 = 50;
        let param2 = 100;

        // Animation variables
        let animationId;
        let time = 0;

        // Main drawing/animation function
        function draw() {
            // Clear canvas (or use trail effect)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            // For full clear: ctx.clearRect(0, 0, width, height);

            // Your drawing code here
            ctx.strokeStyle = '#8B5CF6';
            ctx.lineWidth = 2;
            ctx.beginPath();
            // Example: draw something based on params
            ctx.arc(width / 2, height / 2, param1, 0, Math.PI * 2);
            ctx.stroke();

            // Update time for animations
            time += 0.01;
        }

        // Animation loop (use this for continuous animations)
        function animate() {
            draw();
            animationId = requestAnimationFrame(animate);
        }

        // Static draw (use this for non-animated experiments)
        function drawStatic() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
            // Your static drawing code here
        }

        // Mouse interaction (optional)
        let mouse = { x: null, y: null };

        canvas.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
            // For static drawings, call draw() or drawStatic() here
        });

        canvas.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // Touch events for mobile (optional)
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // Window resize handler
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            // Redraw after resize
            draw();
        });

        // Control handlers
        document.getElementById('param1').addEventListener('input', (e) => {
            param1 = parseInt(e.target.value);
            document.getElementById('param1Value').textContent = param1;
            // For static drawings, redraw here
            // draw();
        });

        document.getElementById('param2').addEventListener('input', (e) => {
            param2 = parseInt(e.target.value);
            document.getElementById('param2Value').textContent = param2;
            // For static drawings, redraw here
            // draw();
        });

        // Optional reset function
        function resetCanvas() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
            time = 0;
        }

        // Start the experiment
        // For animations: uncomment this
        // animate();

        // For static drawings: uncomment this
        // drawStatic();
    </script>
</body>
</html>
