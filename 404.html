<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | MABD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .error-container {
            text-align: center;
            max-width: 600px;
        }
        .error-code {
            font-size: clamp(6rem, 15vw, 10rem);
            font-weight: 800;
            color: #FEB52B;
            line-height: 1;
            margin-bottom: 1rem;
            text-shadow: 3px 3px rgba(254, 181, 43, 0.3);
        }
        .error-title {
            font-size: 1.5rem;
            color: #e0e0e0;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }
        .error-description {
            font-size: 1.1rem;
            color: #e0e0e0;
            opacity: 0.7;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 1.75rem;
            background: transparent;
            color: #FEB52B;
            border: 2px solid #FEB52B;
            border-radius: 25px;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .home-link:hover {
            background: #FEB52B;
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(254, 181, 43, 0.3);
        }
        @media (max-width: 480px) {
            .error-code { font-size: 5rem; }
            .error-title { font-size: 1.25rem; }
            .error-description { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-description">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="home-link">
            ← Back to Home
        </a>
    </div>
</body>
</html>
