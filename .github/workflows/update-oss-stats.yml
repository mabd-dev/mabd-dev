name: Update OSS Contributions

# Manual trigger only
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    name: Fetch and Commit OSS Stats
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install gh-oss-stats
        run: |
            curl -fSL -o gh-oss-stats "https://github.com/mabd-dev/gh-oss-stats/releases/latest/download/gh-oss-stats-linux-arm64"
            chmod +x gh-oss-stats

      - name: Create output directory
        run: mkdir -p scripts/oss-contributions

      - name: Run gh-oss-stats
        env:
          GITHUB_TOKEN: ${{ secrets.GH_OSS_TOKEN }}
        run: |
          ./gh-oss-stats \
            --user mabd-dev \
            --include-loc=true \
            -v=true \
            -o scripts/oss-contributions/contributions.json

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Updated OSS contributions data'
          file_pattern: scripts/oss-contributions/contributions.json

      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: oss-contributions
          path: scripts/oss-contributions/contributions.json
          retention-days: 30
