name: Update OSS Contributions

# Manual trigger only
on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    name: Fetch and Commit OSS Stats
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download gh-oss-stats
        shell: bash
        run: |
          echo "::group::Installing gh-oss-stats binary"
          
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')  # Linux -> linux, Darwin -> darwin
          ARCH=$(uname -m)
          
          # Map architecture names
          case "$ARCH" in
            x86_64)  ARCH="amd64" ;;
            aarch64) ARCH="arm64" ;;
            arm64)   ARCH="arm64" ;;  # macOS reports arm64 directly
            *)
              echo "::error::Unsupported architecture: $ARCH"
              exit 1
              ;;
          esac
          
          BINARY="gh-oss-stats-${OS}-${ARCH}"
          
          # Validate supported combinations
          case "$BINARY" in
            gh-oss-stats-linux-amd64|gh-oss-stats-linux-arm64|gh-oss-stats-darwin-arm64)
              echo "Downloading $BINARY..."
              ;;
            *)
              echo "::error::Unsupported platform: ${OS}/${ARCH}"
              echo "::error::Supported: linux/amd64, linux/arm64, darwin/arm64"
              exit 1
              ;;
          esac
          
          curl -fSL -o gh-oss-stats \
            "https://github.com/mabd-dev/gh-oss-stats/releases/latest/download/${BINARY}"
          chmod +x gh-oss-stats
          
          echo "✅ Installed $BINARY"
          echo "::endgroup::"

      - name: Create output directory
        run: mkdir -p scripts/oss-contributions

      - name: Run gh-oss-stats
        env:
          GITHUB_TOKEN: ${{ secrets.GH_OSS_TOKEN }}
        run: |
          ./gh-oss-stats \
            --user mabd-dev \
            --include-loc=true \
            -v=true \
            -o scripts/oss-contributions/contributions.json

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Updated OSS contributions data'
          file_pattern: scripts/oss-contributions/contributions.json

      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: oss-contributions
          path: scripts/oss-contributions/contributions.json
          retention-days: 30
