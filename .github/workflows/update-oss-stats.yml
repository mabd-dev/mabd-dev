name: Update OSS Contributions

# Manual trigger only
on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday at midnight
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create output directory
        run: mkdir -p scripts/oss-contributions
      
      - name: Generate OSS Stats
        id: stats
        uses: mabd-dev/gh-oss-stats-action@v0.2.3
        with:
          username: mabd-dev
          mode: fetch

      - name: Save stats to file
        env:
          STATS_JSON: ${{ steps.stats.outputs.json }}
        run: |
          echo "Saving stats to json"
          echo "$STATS_JSON" | jq .
          echo "$STATS_JSON" > scripts/oss-contributions/contributions.json

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Updated OSS contributions data'
          file_pattern: scripts/oss-contributions/contributions.json

      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: oss-contributions
          path: scripts/oss-contributions/contributions.json
          retention-days: 30
