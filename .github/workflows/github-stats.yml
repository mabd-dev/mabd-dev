name: Generate Github Badge
on:
  schedule:
    - cron: '0 0 * * 0'  # Weekly
  workflow_dispatch:

permissions:
  contents: write  # Required for auto-commit


jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch GitHub Stats SVG
        run: |
          response=$(curl -s -w "\n%{http_code}" "https://github-readme-stats.vercel.app/api?username=mabd-dev&show_icons=true&count_private=true&hide_title=false&theme=github_dark")
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | head -n -1)

          if [ "$http_code" = "200" ] && echo "$body" | grep -q "<svg"; then
            echo "$body" > github-stats.svg
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add github-stats.svg
            git diff --cached --quiet || git commit -m "Update GitHub stats SVG"
            git push
          else
            echo "Failed to fetch SVG or response is not an SVG (HTTP $http_code)"
            exit 1
          fi
