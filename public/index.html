<!DOCTYPE html>
<html lang="en">
<head>
    <title>MABD Universe</title>
    <link rel="stylesheet" href="style.css">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <canvas id="canvas"></canvas>

    <div class="caption-container">
        <p class="title not-selectable">MABD</p>
        <p class="caption not-selectable">Universe</p>
    </div>


    <div class="footer">
        <div class="social-media-icons-container">
            <div class="social-media-icons-fit-container">
                <a 
                    href="https://github.com/MABD-dev" 
                    target="_blank"
                    class="not-selectable"
                >
                    <img 
                        class="social-media-icon"
                        src="resources/images/github-142-svgrepo-com.svg" 
                        alt="Github"
                    >
                </a>
                <a 
                    href="https://play.google.com/store/apps/developer?id=MABD"
                    target="_blank"
                    class="not-selectable"
                >
                    <img 
                        class="social-media-icon"
                        src="resources/images/google-play-store-svgrepo-com.svg" 
                        alt="Google Play"
                    >
                </a>
                <a 
                    href="https://medium.com/@mabd-dev"
                    target="_blank"
                    class="not-selectable"
                >
                    <img 
                        class="social-media-icon"
                        src="resources/images/medium-svgrepo-com.svg" 
                        alt="Google Play"
                    >
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
